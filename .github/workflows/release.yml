name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            cc: x86_64-w64-mingw32-gcc
            apt: gcc-mingw-w64-x86-64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross-compiler
        if: matrix.apt != ''
        run: sudo apt-get install -y ${{ matrix.apt }}

      - name: Build and archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          go build -ldflags "-X main.version=${GITHUB_REF_NAME}" -o "colref${EXT}" ./cmd/colref/
          tar czf "colref_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" \
            "colref${EXT}" LICENSE README.md

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: colref-${{ matrix.goos }}-${{ matrix.goarch }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create checksums
        run: sha256sum artifacts/*.tar.gz > artifacts/checksums.txt

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            artifacts/*.tar.gz \
            artifacts/checksums.txt \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/shinagawa-web/colref/releases/download/${GITHUB_REF_NAME}"
          SHA_DARWIN_AMD64=$(grep "colref_${VERSION}_darwin_amd64.tar.gz" artifacts/checksums.txt | awk '{print $1}')
          SHA_DARWIN_ARM64=$(grep "colref_${VERSION}_darwin_arm64.tar.gz" artifacts/checksums.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep "colref_${VERSION}_linux_amd64.tar.gz" artifacts/checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep "colref_${VERSION}_linux_arm64.tar.gz" artifacts/checksums.txt | awk '{print $1}')
          cat > colref.rb << FORMULA
          class Colref < Formula
            desc "Check whether a database column is still referenced in your codebase before you delete it"
            homepage "https://github.com/shinagawa-web/colref"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/colref_${VERSION}_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "${BASE}/colref_${VERSION}_darwin_amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE}/colref_${VERSION}_linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "${BASE}/colref_${VERSION}_linux_amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "colref"
            end

            test do
              system "#{bin}/colref", "--version"
            end
          end
          FORMULA
          CONTENT=$(base64 -w 0 colref.rb)
          CURRENT_SHA=$(gh api repos/shinagawa-web/homebrew-tap/contents/Formula/colref.rb --jq '.sha' 2>/dev/null || true)
          if [ -n "$CURRENT_SHA" ]; then
            gh api repos/shinagawa-web/homebrew-tap/contents/Formula/colref.rb \
              --method PUT \
              --raw-field message="Bump colref to ${GITHUB_REF_NAME}" \
              --raw-field "content=${CONTENT}" \
              --raw-field "sha=${CURRENT_SHA}"
          else
            gh api repos/shinagawa-web/homebrew-tap/contents/Formula/colref.rb \
              --method PUT \
              --raw-field message="Bump colref to ${GITHUB_REF_NAME}" \
              --raw-field "content=${CONTENT}"
          fi

  pypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Verify linux/amd64 glibc requirement
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar xzf "artifacts/colref_${VERSION}_linux_amd64.tar.gz" colref
          MAX=$(objdump -T colref 2>/dev/null | grep -oP 'GLIBC_\K[0-9.]+' | sort -V | tail -1)
          echo "Binary requires GLIBC_${MAX:-<none>}"
          python3 -c "
          import sys
          max_str = '${MAX}'
          if not max_str:
              print('No GLIBC symbols found — static binary or objdump mismatch; skipping check')
              sys.exit(0)
          max_v = tuple(int(x) for x in max_str.split('.'))
          limit = (2, 34)
          if max_v > limit:
              raise SystemExit(f'GLIBC_{max_str} exceeds manylinux_2_34 limit')
          print(f'GLIBC_{max_str} <= manylinux_2_34 OK')
          "

      - name: Build wheels
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/build_wheels.py "${VERSION}" artifacts/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/

  rubygems:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Build gems
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ruby scripts/build_gems.rb "${VERSION}" artifacts/

      - name: Push to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          for gem in pkg/*.gem; do
            gem push "$gem"
          done
