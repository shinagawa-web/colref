name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      COVERAGE_THRESHOLD: 100

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -race -coverprofile=coverage.out $(go list ./... | grep -v /e2e)

      - name: Enforce coverage threshold
        run: |
          total=$(go tool cover -func=coverage.out | grep '^total' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          if [ -z "$total" ]; then
            echo "FAIL: could not parse coverage output"
            exit 1
          fi
          if ! awk -v total="$total" -v threshold="$COVERAGE_THRESHOLD" 'BEGIN { exit !(total >= threshold) }'; then
            echo "FAIL: coverage ${total}% is below threshold ${COVERAGE_THRESHOLD}%"
            exit 1
          fi
          echo "Coverage OK."

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run e2e tests
        run: make test-e2e

      - name: Check golden files are up-to-date
        run: |
          make update-golden
          if ! git diff --exit-code test_patterns/; then
            echo ""
            echo "Golden files are out of date. Run 'make update-golden' and commit the changes."
            exit 1
          fi
