name: verify-distribution

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install via go install
        run: go install github.com/shinagawa-web/colref/cmd/colref@latest

      - name: Verify version matches latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          expected=$(gh release view --repo shinagawa-web/colref --json tagName -q .tagName)
          installed=$(go version -m "$(go env GOPATH)/bin/colref" | awk '$1 == "mod" { print $3 }')
          echo "Expected : $expected"
          echo "Installed: $installed"
          if [ "$installed" != "$expected" ]; then
            echo "ERROR: version mismatch"
            exit 1
          fi
          echo "OK: $installed"

  pypi:
    runs-on: ubuntu-latest
    steps:
      - name: Install via pip
        run: pip install colref

      - name: Verify version matches latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          expected=$(gh release view --repo shinagawa-web/colref --json tagName -q .tagName)
          expected_no_v="${expected#v}"
          installed=$(pip show colref | awk '/^Version:/ {print $2}')
          echo "Expected : $expected_no_v"
          echo "Installed: $installed"
          if [ "$installed" != "$expected_no_v" ]; then
            echo "ERROR: version mismatch"
            exit 1
          fi
          echo "OK: $installed"

  rubygems:
    runs-on: ubuntu-latest
    steps:
      - name: Install via gem
        run: |
          gem install colref --user-install
          echo "$(ruby -e 'puts Gem.user_dir')/bin" >> "$GITHUB_PATH"

      - name: Verify version matches latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          expected=$(gh release view --repo shinagawa-web/colref --json tagName -q .tagName)
          expected_no_v="${expected#v}"
          installed=$(gem list colref --local | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
          echo "Expected : $expected_no_v"
          echo "Installed: $installed"
          if [ "$installed" != "$expected_no_v" ]; then
            echo "ERROR: version mismatch"
            exit 1
          fi
          echo "OK: $installed"

  homebrew:
    runs-on: macos-latest
    steps:
      - name: Install via Homebrew
        run: brew install shinagawa-web/tap/colref

      - name: Verify version matches latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          expected=$(gh release view --repo shinagawa-web/colref --json tagName -q .tagName)
          expected_no_v="${expected#v}"
          installed=$(brew list --versions colref | awk '{print $2}')
          echo "Expected : $expected_no_v"
          echo "Installed: $installed"
          if [ "$installed" != "$expected_no_v" ]; then
            echo "ERROR: version mismatch"
            exit 1
          fi
          echo "OK: $installed"
