version: 2

builds:
  - id: colref
    main: ./cmd/colref/
    binary: colref
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
    ldflags:
      - -s -w
      - -X main.version={{.Tag}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "colref_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github-native

release:
  draft: false
  prerelease: auto

brews:
  - name: colref
    repository:
      owner: shinagawa-web
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/shinagawa-web/colref
    description: Check whether a database column is still referenced in your codebase before you delete it.
    license: MIT
    install: |
      bin.install "colref"
    test: |
      system "#{bin}/colref", "--version"
